<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>VERTICAL</title>
<meta name="description" content="Programa de fuerza para baloncesto: rutinas, cargas y progreso.">
<meta name="theme-color" content="#131110">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VERTICAL">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-512.png">
<link rel="apple-touch-startup-image" href="splash-dark.png"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: dark)">
<link rel="apple-touch-startup-image" href="splash-light.png"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"><style>
/* ================= VERTICAL =================
   Oscuro  = pista en sombra (cuero, hierro, cal)
   Claro   = parqué de arce con las mismas líneas de cal
   ============================================ */

:root {
  --court: #F0E3CB;
  --court-2: #E6D5B6;
  --panel: #FBF5E9;
  --panel-2: #FFFDF7;
  --hair: #D8C4A0;
  --hair-soft: #E7D8BC;
  --chalk: #221A0F;
  --chalk-dim: #6A5940;
  --chalk-mute: #8E7C61;
  --leather: #C24717;
  --leather-soft: #F3DCCE;
  --rim: #A66E0C;
  --iron: #6B5D4C;
  --gear: #C3AA80;
  --shadow: 0 1px 2px rgba(60, 42, 14, .10), 0 6px 18px rgba(60, 42, 14, .07);

  --f-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --f-num: ui-rounded, "SF Pro Rounded", "Segoe UI Variable Display", -apple-system, system-ui, sans-serif;
  --f-mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, monospace;

  --r: 16px;
  --gut: 16px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --court: #131110;
    --court-2: #0C0B0A;
    --panel: #1D1A17;
    --panel-2: #262220;
    --hair: #3A322B;
    --hair-soft: #2C2622;
    --chalk: #F5F0E6;
    --chalk-dim: #A2977F;
    --chalk-mute: #7E7364;
    --leather: #EE6A2C;
    --leather-soft: #3A2418;
    --rim: #F0A340;
    --iron: #9A8F7F;
    --gear: #564B40;
    --shadow: 0 1px 2px rgba(0, 0, 0, .5), 0 8px 24px rgba(0, 0, 0, .35);
  }
}

:root[data-theme="dark"] {
  --court: #131110;
  --court-2: #0C0B0A;
  --panel: #1D1A17;
  --panel-2: #262220;
  --hair: #3A322B;
  --hair-soft: #2C2622;
  --chalk: #F5F0E6;
  --chalk-dim: #A2977F;
  --chalk-mute: #7E7364;
  --leather: #EE6A2C;
  --leather-soft: #3A2418;
  --rim: #F0A340;
  --iron: #9A8F7F;
  --gear: #564B40;
  --shadow: 0 1px 2px rgba(0, 0, 0, .5), 0 8px 24px rgba(0, 0, 0, .35);
}

:root[data-theme="light"] {
  --court: #F0E3CB;
  --court-2: #E6D5B6;
  --panel: #FBF5E9;
  --panel-2: #FFFDF7;
  --hair: #D8C4A0;
  --hair-soft: #E7D8BC;
  --chalk: #221A0F;
  --chalk-dim: #6A5940;
  --chalk-mute: #8E7C61;
  --leather: #C24717;
  --leather-soft: #F3DCCE;
  --rim: #A66E0C;
  --iron: #6B5D4C;
  --gear: #C3AA80;
  --shadow: 0 1px 2px rgba(60, 42, 14, .10), 0 6px 18px rgba(60, 42, 14, .07);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

/* Altura en unidades de viewport dinamico, no en porcentajes.
   Con height:100% iOS resuelve el alto contra la ventana de maquetacion, que en
   una app instalada no coincide con la pantalla real cuando la pagina no llega
   a hacer scroll. Resultado: la barra de pestañas, que va anclada con
   bottom:0, se quedaba flotando con un hueco debajo en las pantallas cortas. */
html, body {
  margin: 0;
  min-height: 100vh;
  min-height: 100dvh;
  overscroll-behavior-y: none;
}

body {
  background: var(--court);
  color: var(--chalk);
  font-family: var(--f-ui);
  font-size: 16px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
}

button, input, select { font: inherit; color: inherit; }
button { background: none; border: 0; padding: 0; cursor: pointer; }
:focus-visible { outline: 2px solid var(--leather); outline-offset: 2px; border-radius: 6px; }

/* ---------- shell ---------- */
/* El shell llena siempre la pantalla, tenga la pestaña mucho contenido o poco,
   para que todas se comporten igual. */
#app {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex; flex-direction: column;
}

.screen {
  flex: 1;
  padding: 0 var(--gut) calc(96px + env(safe-area-inset-bottom));
  max-width: 720px; width: 100%; margin: 0 auto;
}

/* Cabecera con la curva del triple */
.hdr {
  position: relative;
  padding: calc(env(safe-area-inset-top) + 18px) 0 14px;
  overflow: hidden;
}
/* Si la marca ya ha reservado el hueco del notch, la cabecera no lo repite. */
.screen > div:first-child + .hdr { padding-top: 12px; }
.hdr .arc {
  position: absolute; inset: auto 0 -46px -10%;
  width: 120%; height: 120px; pointer-events: none;
  border-top: 1.5px solid var(--hair);
  border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  opacity: .8;
}
.hdr h1 {
  margin: 0; font-size: 30px; line-height: 1.1; letter-spacing: -.022em; font-weight: 700;
  text-wrap: balance;
}
.eyebrow {
  font-family: var(--f-mono); font-size: 11px; letter-spacing: .13em;
  text-transform: uppercase; color: var(--chalk-mute); margin: 0 0 4px;
}
.sub { margin: 6px 0 0; color: var(--chalk-dim); font-size: 14.5px; }

/* ---------- tabs ---------- */
.tabbar {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 40;
  display: grid; grid-template-columns: repeat(5, 1fr);
  padding: 8px 6px calc(6px + env(safe-area-inset-bottom));
  background: color-mix(in srgb, var(--court) 88%, transparent);
  backdrop-filter: saturate(1.6) blur(18px);
  -webkit-backdrop-filter: saturate(1.6) blur(18px);
  border-top: 1px solid var(--hair-soft);
}
.tabbar button {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 5px 2px; color: var(--chalk-mute); border-radius: 10px;
  font-family: var(--f-mono); font-size: 9.5px; letter-spacing: .06em; text-transform: uppercase;
}
.tabbar button svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
.tabbar button[aria-current="true"] { color: var(--leather); }

/* ---------- tarjetas ---------- */
.card {
  background: var(--panel); border: 1px solid var(--hair-soft);
  border-radius: var(--r); box-shadow: var(--shadow);
}
.stack { display: flex; flex-direction: column; gap: 12px; }
.stack-lg { display: flex; flex-direction: column; gap: 22px; }

.sect-title {
  font-family: var(--f-mono); font-size: 11px; letter-spacing: .13em;
  text-transform: uppercase; color: var(--chalk-mute);
  margin: 0 0 10px; display: flex; align-items: center; gap: 10px;
}
.sect-title::after { content: ""; flex: 1; height: 1px; background: var(--hair-soft); }

/* ---------- HOY: tarjeta de sesión ---------- */
.today {
  padding: 18px; display: flex; flex-direction: column; gap: 16px;
  position: relative; overflow: hidden;
}
.today .slot {
  display: inline-flex; align-items: baseline; gap: 8px;
  font-family: var(--f-mono); font-size: 11px; letter-spacing: .13em;
  text-transform: uppercase; color: var(--leather);
}
.today h2 { margin: 0; font-size: 27px; letter-spacing: -.02em; line-height: 1.12; }
.today .meta { display: flex; gap: 18px; color: var(--chalk-dim); font-size: 13.5px; }
.today .meta b { font-family: var(--f-num); font-size: 17px; color: var(--chalk); font-weight: 600; }

.btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  min-height: 50px; padding: 0 20px; border-radius: 13px;
  background: var(--leather); color: #FFF7F1;
  font-weight: 600; font-size: 16.5px; letter-spacing: -.01em;
  transition: transform .12s ease, filter .12s ease;
}
.btn:active { transform: scale(.985); filter: brightness(.94); }
.btn-ghost {
  background: none; color: var(--chalk); border: 1px solid var(--hair);
  min-height: 46px; font-weight: 500; font-size: 15.5px;
}
.btn-sm { min-height: 38px; font-size: 14.5px; padding: 0 14px; border-radius: 10px; }
.btn[disabled] { opacity: .45; pointer-events: none; }

/* ---------- calendario semanal ---------- */
.week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
.week > div {
  text-align: center; padding: 9px 2px 10px; border-radius: 10px;
  background: var(--panel); border: 1px solid var(--hair-soft);
}
.week .d { font-family: var(--f-mono); font-size: 9.5px; letter-spacing: .06em; text-transform: uppercase; color: var(--chalk-mute); }
.week .m { font-family: var(--f-num); font-size: 15px; font-weight: 650; margin-top: 3px; }
.week .gym { background: var(--leather-soft); border-color: color-mix(in srgb, var(--leather) 32%, transparent); }
.week .gym .m { color: var(--leather); }
.week .now { outline: 2px solid var(--chalk); outline-offset: -2px; }
.week .off .m { color: var(--chalk-mute); font-weight: 500; }

/* ---------- lista de ejercicios ---------- */
.exrow {
  display: flex; align-items: center; gap: 13px; padding: 11px 13px;
  width: 100%; text-align: left; border-radius: 13px;
  background: var(--panel); border: 1px solid var(--hair-soft);
}
.exrow .thumb {
  flex: 0 0 78px; height: 60px; border-radius: 9px;
  background: var(--court-2); border: 1px solid var(--hair-soft); overflow: hidden;
}
.exrow .thumb canvas { display: block; width: 100%; height: 100%; }
.exrow .nm { flex: 1; min-width: 0; }
.exrow .nm strong { display: block; font-size: 15.5px; font-weight: 600; letter-spacing: -.012em; }
.exrow .nm span { display: block; font-family: var(--f-mono); font-size: 11px; color: var(--chalk-mute); margin-top: 2px; }
.exrow .prog { font-family: var(--f-num); font-size: 14px; font-weight: 650; color: var(--chalk-mute); }
.exrow.done { border-color: color-mix(in srgb, var(--leather) 40%, transparent); }
.exrow.done .prog { color: var(--leather); }

/* ---------- ficha de ejercicio ---------- */
.stage {
  height: 236px; border-radius: 14px; overflow: hidden;
  background: var(--court-2); border: 1px solid var(--hair-soft);
  position: relative;
}
.stage canvas { display: block; width: 100%; height: 100%; }
.stage .badge {
  position: absolute; top: 10px; left: 10px;
  font-family: var(--f-mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--chalk-mute); background: color-mix(in srgb, var(--court) 70%, transparent);
  padding: 4px 8px; border-radius: 7px;
}

.cues { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 9px; }
.cues li { display: flex; gap: 11px; font-size: 14.5px; color: var(--chalk-dim); line-height: 1.42; }
.cues li b {
  flex: 0 0 auto; font-family: var(--f-mono); font-size: 11px; color: var(--leather);
  padding-top: 3px; font-weight: 400;
}
.transfer {
  padding: 13px 15px; border-radius: 12px;
  background: var(--leather-soft); color: var(--chalk);
  font-size: 14.5px; line-height: 1.42;
  border: 1px solid color-mix(in srgb, var(--leather) 24%, transparent);
}

/* ---------- registro de series ---------- */
.sets { display: flex; flex-direction: column; gap: 8px; }
.setrow {
  display: grid; grid-template-columns: 30px 1fr 1fr 46px; gap: 8px; align-items: center;
}
.setrow .n {
  font-family: var(--f-mono); font-size: 12px; color: var(--chalk-mute); text-align: center;
}
.fld { position: relative; }
.fld input {
  width: 100%; height: 46px; padding: 14px 8px 2px; text-align: center;
  background: var(--panel-2); border: 1px solid var(--hair); border-radius: 11px;
  font-family: var(--f-num); font-size: 19px; font-weight: 650; letter-spacing: -.02em;
  font-variant-numeric: tabular-nums;
}
.fld input::placeholder { color: var(--chalk-mute); font-weight: 500; }
.fld label {
  position: absolute; top: 4px; left: 0; right: 0; text-align: center;
  font-family: var(--f-mono); font-size: 8.5px; letter-spacing: .1em;
  text-transform: uppercase; color: var(--chalk-mute); pointer-events: none;
}
.tick {
  height: 46px; border-radius: 11px; border: 1px solid var(--hair);
  display: flex; align-items: center; justify-content: center;
  color: var(--chalk-mute); background: var(--panel-2);
  transition: background .14s ease, color .14s ease, border-color .14s ease;
}
.tick svg { width: 19px; height: 19px; stroke: currentColor; fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
.setrow.done .tick { background: var(--leather); border-color: var(--leather); color: #FFF7F1; }
.setrow.done .fld input { color: var(--chalk); border-color: color-mix(in srgb, var(--leather) 38%, transparent); }

.hint {
  font-family: var(--f-mono); font-size: 11px; color: var(--chalk-mute);
  display: flex; justify-content: space-between; gap: 10px;
}
.hint b { color: var(--chalk-dim); font-weight: 400; }

/* ---------- descanso ---------- */
.rest {
  position: fixed; left: 0; right: 0; bottom: calc(66px + env(safe-area-inset-bottom));
  z-index: 45; padding: 0 var(--gut);
  max-width: 720px; margin: 0 auto;
  transform: translateY(200%); opacity: 0; visibility: hidden;
  transition: transform .28s cubic-bezier(.32, .72, 0, 1), opacity .2s ease, visibility 0s .28s;
}
.rest.on { transform: none; opacity: 1; visibility: visible; transition-delay: 0s; }
.rest-in {
  position: relative; overflow: hidden;
  background: var(--panel-2); border: 1px solid var(--hair);
  border-radius: 14px; box-shadow: var(--shadow);
  padding: 12px 15px; display: flex; align-items: center; gap: 14px;
}
.rest .fill {
  position: absolute; inset: 0 auto 0 0; width: 0%;
  background: var(--leather-soft); transition: width .95s linear;
}
.rest .txt { position: relative; flex: 1; }
.rest .txt .lbl { font-family: var(--f-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--chalk-mute); }
.rest .txt .t { font-family: var(--f-num); font-size: 26px; font-weight: 650; letter-spacing: -.02em; font-variant-numeric: tabular-nums; line-height: 1.1; }
.rest .acts { position: relative; display: flex; gap: 7px; }

/* ---------- progreso ---------- */
.kpis { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.kpi { padding: 14px 15px; border-radius: 13px; background: var(--panel); border: 1px solid var(--hair-soft); }
.kpi .k { font-family: var(--f-mono); font-size: 10px; letter-spacing: .11em; text-transform: uppercase; color: var(--chalk-mute); }
.kpi .v { font-family: var(--f-num); font-size: 27px; font-weight: 700; letter-spacing: -.025em; margin-top: 3px; font-variant-numeric: tabular-nums; }
.kpi .v small { font-size: 14px; font-weight: 600; color: var(--chalk-mute); margin-left: 2px; }
.kpi .d { font-family: var(--f-mono); font-size: 10.5px; color: var(--chalk-mute); margin-top: 2px; }
.kpi .d.up { color: var(--leather); }

.chart { padding: 14px; border-radius: 13px; background: var(--panel); border: 1px solid var(--hair-soft); }
.chart canvas { display: block; width: 100%; height: 148px; }
.chart .top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; gap: 10px; }
.chart .top strong { font-size: 15px; font-weight: 600; letter-spacing: -.012em; }
.chart .top span { font-family: var(--f-num); font-size: 15px; font-weight: 650; color: var(--leather); }

.pr {
  display: flex; align-items: center; gap: 10px; padding: 11px 13px;
  border-radius: 12px; background: var(--panel); border: 1px solid var(--hair-soft);
}
.pr .nm { flex: 1; font-size: 14.5px; }
.pr .val { font-family: var(--f-num); font-size: 16px; font-weight: 650; font-variant-numeric: tabular-nums; }
.pr .dt { font-family: var(--f-mono); font-size: 10.5px; color: var(--chalk-mute); }

/* ---------- varios ---------- */
.chips { display: flex; gap: 7px; flex-wrap: wrap; }
.chip {
  padding: 7px 13px; border-radius: 999px; border: 1px solid var(--hair);
  font-size: 13.5px; color: var(--chalk-dim); background: var(--panel);
}
.chip[aria-pressed="true"] { background: var(--chalk); color: var(--court); border-color: var(--chalk); }

.empty {
  text-align: center; padding: 34px 20px; color: var(--chalk-mute);
  font-size: 14.5px; line-height: 1.5;
}

.sheet-bg {
  position: fixed; inset: 0; z-index: 60; background: rgba(0, 0, 0, .45);
  opacity: 0; pointer-events: none; transition: opacity .24s ease;
}
.sheet-bg.on { opacity: 1; pointer-events: auto; }
.sheet {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 61;
  background: var(--court); border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--hair);
  padding: 8px var(--gut) calc(20px + env(safe-area-inset-bottom));
  max-height: 88vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
  max-width: 720px; margin: 0 auto;
  transform: translateY(100%); transition: transform .3s cubic-bezier(.32, .72, 0, 1);
}
.sheet.on { transform: none; }
.grab { width: 38px; height: 4px; border-radius: 2px; background: var(--hair); margin: 6px auto 14px; }

.row {
  display: flex; align-items: center; gap: 12px; padding: 13px 15px;
  background: var(--panel); border: 1px solid var(--hair-soft); border-radius: 13px;
}
.row .lb { flex: 1; font-size: 15px; }
.row .rb { font-family: var(--f-num); font-size: 15px; font-weight: 600; color: var(--chalk-mute); }

@media (prefers-reduced-motion: reduce) {
  * { transition-duration: .01ms !important; animation-duration: .01ms !important; }
}

</style>
</head>
<body>

<div id="app">
  <nav class="tabbar" aria-label="Secciones"></nav>
</div>

<!-- barra de descanso -->
<div class="rest" id="rest" role="status" aria-live="polite">
  <div class="rest-in">
    <span class="fill" id="rest-f"></span>
    <span class="txt">
      <span class="lbl">Descanso</span>
      <span class="t" id="rest-t">0s</span>
    </span>
    <span class="acts">
      <button class="btn btn-ghost btn-sm" id="rest-add">+30s</button>
      <button class="btn btn-sm" id="rest-skip">Listo</button>
    </span>
  </div>
</div>

<script>
/* VERTICAL — catálogo de ejercicios y programa
   Fuente: Programa_Gimnasio_Baloncesto.docx (microciclo de 2 semanas en espejo)
   log:  'weight' peso×reps · 'bw' peso corporal (+lastre) ×reps
         'time' segundos · 'height' altura de cajón (cm)×reps · 'steps' pasos/lado */

const EX = {
  /* ---------- TREN INFERIOR ---------- */
  sentadilla: {
    name: 'Sentadilla trasera / frontal',
    tag: 'Sentadilla', group: 'inferior', log: 'weight', anim: 'squat',
    transfer: 'Base de fuerza máxima para saltar, defender en posición baja y aguantar contacto.',
    cues: [
      'Barra fija sobre el mediopié durante todo el recorrido.',
      'Rompe con la cadera y la rodilla a la vez, no solo con la cadera.',
      'Rodillas siguiendo la línea de los pies, sin colapsar hacia dentro.',
      'Baja hasta que el pliegue de la cadera pase la rodilla, si tu movilidad lo permite.',
      'Aire dentro y abdomen apretado antes de bajar; suelta arriba.'
    ]
  },
  bulgara: {
    name: 'Zancada búlgara con mancuernas',
    tag: 'Búlgara', group: 'inferior', log: 'weight', anim: 'bulgarian', perSide: true,
    transfer: 'Fuerza unilateral: salidas, cambios de dirección y primer paso.',
    cues: [
      'Pie trasero apoyado en el banco, no clavado: el trabajo es de la pierna delantera.',
      'Separa el pie delantero lo suficiente para que la rodilla no se vaya muy por delante.',
      'Baja vertical, como un ascensor; el torso apenas se inclina.',
      'Empuja con todo el pie delantero, sobre todo el talón.',
      'Misma carga y mismas reps en las dos piernas: empieza por la débil.'
    ]
  },
  rdl: {
    name: 'Peso muerto rumano',
    tag: 'RDL', group: 'inferior', log: 'weight', anim: 'rdl',
    transfer: 'Cadena posterior: rebote, aceleración y protección de rodilla.',
    cues: [
      'Es una bisagra de cadera, no una sentadilla: la cadera va hacia atrás.',
      'Rodillas ligeramente flexionadas y quietas durante la bajada.',
      'Barra rozando el muslo todo el rato; si se separa, la espalda paga.',
      'Baja hasta notar el estiramiento del isquio, no más.',
      'Espalda plana de principio a fin; el pecho no se hunde.'
    ]
  },
  puente_uni: {
    name: 'Puente de glúteo a una pierna',

/* VERTICAL — motor de animación del muñeco.
   Cada ejercicio son keyframes de esqueleto 2D + material (barra, balón, cajón…).
   Espacio de dibujo: 220 × 170, suelo en y = 150. El muñeco mira a la derecha. */

const ANIM = (() => {
  const GROUND = 150;
  const W = 220, H = 170;

  /* Pose base de pie. Cada keyframe solo sobreescribe lo que cambia. */
  const B = {
    hd: [110, 36], nk: [110, 55], hp: [110, 93],
    e1: [115, 74], h1: [116, 95], e2: [105, 74], h2: [104, 95],
    k1: [112, 122], a1: [110, 150], k2: [108, 122], a2: [110, 150]
  };
  const P = o => Object.assign({}, B, o);
  const J = ['hd', 'nk', 'hp', 'e1', 'h1', 'e2', 'h2', 'k1', 'a1', 'k2', 'a2'];

  /* ---------- interpolación ---------- */
  const smooth = t => t * t * (3 - 2 * t);
  function poseAt(keys, t) {
    let i = 0;
    while (i < keys.length - 2 && t > keys[i + 1][0]) i++;
    const [t0, p0] = keys[i], [t1, p1] = keys[i + 1];
    const u = t1 === t0 ? 0 : smooth((t - t0) / (t1 - t0));
    const out = {};
    for (const j of J) out[j] = [p0[j][0] + (p1[j][0] - p0[j][0]) * u, p0[j][1] + (p1[j][1] - p0[j][1]) * u];
    return out;
  }

  /* ---------- primitivas de dibujo ---------- */
  function seg(c, a, b, w, col) {
    c.strokeStyle = col; c.lineWidth = w; c.lineCap = 'round'; c.lineJoin = 'round';
    c.beginPath(); c.moveTo(a[0], a[1]); c.lineTo(b[0], b[1]); c.stroke();
  }
  function limb(c, a, b, d, w, col) { seg(c, a, b, w, col); seg(c, b, d, w * 0.85, col); }
  function dot(c, p, r, col) { c.fillStyle = col; c.beginPath(); c.arc(p[0], p[1], r, 0, 7); c.fill(); }

  /* Barra vista en escorzo: corta, con los discos de canto. */
  function barbell(c, x, y, S, half) {
    half = half || 17;
    c.strokeStyle = S.iron; c.lineWidth = 3.2; c.lineCap = 'round';
    c.beginPath(); c.moveTo(x - half, y); c.lineTo(x + half, y); c.stroke();
    c.fillStyle = S.iron;
    for (const s of [-1, 1]) {
      c.beginPath(); c.ellipse(x + s * (half - 3), y, 3, 11, 0, 0, 7); c.fill();
    }
  }
  /* Barra perpendicular a la vista: se ve el disco de frente. */
  function plate(c, x, y, S, r) {
    r = r || 12;
    c.strokeStyle = S.iron; c.lineWidth = 4.2;
    c.beginPath(); c.arc(x, y, r, 0, 7); c.stroke();
    c.fillStyle = S.iron; c.beginPath(); c.arc(x, y, 3.2, 0, 7); c.fill();
  }
  /* Barra fija de dominadas / jaula: sin discos. */
  function fixedbar(c, x, y, half, S) {
    c.strokeStyle = S.iron; c.lineWidth = 4; c.lineCap = 'round';
    c.beginPath(); c.moveTo(x - half, y); c.lineTo(x + half, y); c.stroke();
    c.lineWidth = 2.6;
    for (const s of [-1, 1]) { c.beginPath(); c.moveTo(x + s * half, y); c.lineTo(x + s * half, y - 14); c.stroke(); }
  }
  /* Mancuerna de canto: desde el lateral se ve el disco, no el asa. */
  function dumbbell(c, p, S) {
    c.fillStyle = S.iron;
    c.beginPath(); c.arc(p[0], p[1], 6.5, 0, 7); c.fill();
    c.strokeStyle = S.court; c.lineWidth = 1.6;
    c.beginPath(); c.arc(p[0], p[1], 2.6, 0, 7); c.stroke();
  }
  function ball(c, x, y, r, S) {
    c.fillStyle = S.leather; c.beginPath(); c.arc(x, y, r, 0, 7); c.fill();
    c.strokeStyle = S.court; c.lineWidth = 1.1;
    c.beginPath(); c.moveTo(x - r, y); c.lineTo(x + r, y); c.stroke();
    c.beginPath(); c.arc(x, y, r, 0, 7); c.stroke();
    c.beginPath(); c.ellipse(x, y, r * 0.42, r, 0, 0, 7); c.stroke();
  }
  function slab(c, x, y, w, h, S, col) {
    c.fillStyle = col || S.gear; c.beginPath(); c.roundRect(x, y, w, h, 2.5); c.fill();
  }
  function bench(c, x, y, w, S) {
    slab(c, x, y, w, 7, S);
    c.fillStyle = S.gear;
    c.fillRect(x + 5, y + 7, 3.5, GROUND - y - 7);
    c.fillRect(x + w - 8.5, y + 7, 3.5, GROUND - y - 7);
  }
  function cable(c, from, to, S) {
    c.strokeStyle = S.cable; c.lineWidth = 1.6; c.setLineDash([]);
    c.beginPath(); c.moveTo(from[0], from[1]); c.lineTo(to[0], to[1]); c.stroke();
    slab(c, from[0] - 5, from[1] - 5, 10, 10, S);
  }
  function band(c, a, b, S) {
    c.strokeStyle = S.band; c.lineWidth = 2.4; c.setLineDash([4, 3]);
    const mx = (a[0] + b[0]) / 2, my = Math.max(a[1], b[1]) + 5;
    c.beginPath(); c.moveTo(a[0], a[1]); c.quadraticCurveTo(mx, my, b[0], b[1]); c.stroke();
    c.setLineDash([]);
  }
  function wall(c, x, S) {
    c.strokeStyle = S.faint; c.lineWidth = 2;
    c.beginPath(); c.moveTo(x, 18); c.lineTo(x, GROUND); c.stroke();
    c.lineWidth = 1;
    for (let y = 26; y < GROUND; y += 12) { c.beginPath(); c.moveTo(x, y); c.lineTo(x - 7, y + 7); c.stroke(); }
  }

  /* ---------- ejercicios ---------- */
  /* keys: [tiempo 0-1, pose]. La última pose debe cerrar el bucle. */
  const EXR = {};

  /* --- SENTADILLA --- */
  const sqTop = P({ hd: [108, 38], nk: [110, 56], e1: [101, 77], h1: [100, 55], e2: [99, 77], h2: [98, 55] });
  const sqBot = P({
    hd: [119, 76], nk: [110, 92], hp: [92, 124], e1: [92, 108], h1: [100, 88], e2: [90, 108], h2: [98, 88],
    k1: [129, 125], a1: [112, 150], k2: [127, 125], a2: [108, 150]
  });
  EXR.squat = {
    dur: 3400, keys: [[0, sqTop], [.45, sqBot], [.82, sqTop], [1, sqTop]],
    post: (c, p, t, S) => barbell(c, p.nk[0] + 1, p.nk[1] - 6, S)
  };

  /* --- ZANCADA BÚLGARA --- */
  const buTop = P({
    hd: [104, 36], nk: [106, 55], hp: [108, 94],
    e1: [114, 76], h1: [117, 104], e2: [100, 76], h2: [99, 104],
    k1: [104, 122], a1: [102, 150], k2: [130, 118], a2: [150, 122]
  });
  const buBot = P({
    hd: [100, 58], nk: [103, 77], hp: [106, 116],
    e1: [112, 98], h1: [115, 126], e2: [96, 98], h2: [95, 126],
    k1: [116, 132], a1: [102, 150], k2: [128, 140], a2: [150, 122]
  });
  EXR.bulgarian = {
    dur: 3200, keys: [[0, buTop], [.45, buBot], [.85, buTop], [1, buTop]],
    pre: (c, p, t, S) => bench(c, 144, 122, 46, S),
    post: (c, p, t, S) => { dumbbell(c, p.h1, S); dumbbell(c, p.h2, S); }
  };

  /* --- PESO MUERTO RUMANO --- */
  const rdTop = P({ h1: [114, 98], h2: [106, 98], e1: [114, 76], e2: [106, 76] });
  const rdBot = P({
    hd: [138, 70], nk: [128, 82], hp: [96, 96],
    e1: [126, 104], h1: [124, 126], e2: [124, 104], h2: [122, 126],
    k1: [104, 122], a1: [102, 150], k2: [100, 122], a2: [102, 150]
  });
  EXR.rdl = {
    dur: 3600, keys: [[0, rdTop], [.5, rdBot], [.88, rdTop], [1, rdTop]],
    post: (c, p, t, S) => barbell(c, (p.h1[0] + p.h2[0]) / 2, (p.h1[1] + p.h2[1]) / 2 + 3, S)
  };

  /* --- PUENTE DE GLÚTEO UNILATERAL ---
     En el suelo. Hombros y brazos apoyados, un pie plantado y la otra pierna
     estirada, que sube y baja siguiendo la línea del tronco. */
  const gbDown = {
    hd: [54, 140], nk: [72, 142], hp: [116, 144],
    e1: [86, 149], h1: [102, 151], e2: [84, 147], h2: [100, 149],
    k1: [150, 127], a1: [157, 150], k2: [146, 133], a2: [176, 125]
  };
  /* Arriba, hombro-cadera-rodilla forman una línea recta (−14°). Ni un grado
     más: si la cadera subiera más, el dibujo estaría enseñando justo la
     hiperextensión lumbar que advierte la clave de técnica. */
  const gbUp = {
    hd: [54, 138], nk: [72, 140], hp: [118, 128],
    e1: [86, 149], h1: [102, 151], e2: [84, 147], h2: [100, 149],
    k1: [151, 120], a1: [157, 150], k2: [150, 118], a2: [181, 108]
  };
  EXR.glutebridge = {

/* ============ cronómetro de descanso ============ */
const R = { left: 0, total: 0, iv: null };
function startRest(sec) {
  clearInterval(R.iv);
  R.total = sec; R.left = sec;
  paintRest(); $('#rest').classList.add('on');
  R.iv = setInterval(() => {
    R.left--;
    if (R.left <= 0) { stopRest(); beep(); toast('Descanso terminado. A por la siguiente.'); }
    else paintRest();
  }, 1000);
}
function stopRest() { clearInterval(R.iv); R.iv = null; $('#rest').classList.remove('on'); }
function paintRest() {
  const m = Math.floor(R.left / 60), s = R.left % 60;
  $('#rest-t').textContent = m ? `${m}:${String(s).padStart(2, '0')}` : `${s}s`;
  $('#rest-f').style.width = (100 - (R.left / R.total) * 100) + '%';
}

/* ============ consultas al historial ============ */
function lastEntry(exId, beforeActive = true) {
  for (let i = S.log.length - 1; i >= 0; i--) {
    const s = S.log[i].sets[exId];
    if (s && s.some(x => x.done)) return { sets: s.filter(x => x.done), date: S.log[i].date };
  }
  return null;
}
function allSets(exId) {
  const out = [];
  for (const ses of S.log) {
    const s = ses.sets[exId];
    if (s) { const d = s.filter(x => x.done); if (d.length) out.push({ date: ses.date, sets: d }); }
  }
  return out;
}
const bestOf = sets => sets.reduce((b, x) => {
  const w = x.w || 0, r = x.r || 0;
  const score = w > 0 ? w * 1000 + r : r;
  return !b || score > b.score ? { w, r, score } : b;
}, null);
const e1rm = (w, r) => (w > 0 && r > 0) ? Math.round(w * (1 + r / 30)) : 0;
const volume = sets => sets.reduce((v, x) => v + (x.w || 0) * (x.r || 0), 0);

function prOf(exId) {
  const hist = allSets(exId); if (!hist.length) return null;
  let best = null;
  for (const h of hist) { const b = bestOf(h.sets); if (b && (!best || b.score > best.score)) best = Object.assign({}, b, { date: h.date }); }
  return best;
}

/* Regla del plan: subir peso si cerraste todas las series en el tope de reps. */
function suggestUp(exId, reps) {
  const l = lastEntry(exId); if (!l) return false;
  const t = topReps(reps);
  return l.sets.length >= 2 && l.sets.every(x => (x.r || 0) >= t);
}

/* ---------- SESIÓN ---------- */
function newSession() {
  const c = cur(), d = dayOf(c);
  const sets = {};
  d.items.forEach(it => {
    const prev = lastEntry(it.ex);
    sets[it.ex] = Array.from({ length: it.sets }, (_, i) => ({
      w: prev && prev.sets[i] ? prev.sets[i].w : (prev && prev.sets.length ? prev.sets[prev.sets.length - 1].w : null),
      r: null, done: false
    }));
  });
  S.active = { date: today(), kind: c.kind, week: c.week, slot: c.slot, sets, started: Date.now() };
  save();
}

function vSesion(s) {
  const a = S.active;
  if (!a) { tab('hoy'); return; }
  const d = DAYS[a.kind];
  header(s, `Semana ${a.week} · Día ${a.slot}`, d.title, d.subtitle, true);

  const body = el('div', 'stack-lg');
  const list = el('div', 'stack');
  d.items.forEach(it => list.appendChild(exRow(it, a)));
  body.appendChild(list);

  const total = d.items.reduce((n, i) => n + i.sets, 0);
  const done = Object.values(a.sets).flat().filter(x => x.done).length;

  const foot = el('section', 'stack');
  foot.innerHTML = `<p class="hint"><span>Series cerradas</span><b>${done} de ${total}</b></p>`;
  const fin = el('button', 'btn');
  fin.textContent = 'Terminar sesión';
  fin.disabled = done === 0;
  fin.onclick = () => finish();
  foot.appendChild(fin);
  const cancel = el('button', 'btn btn-ghost');
  cancel.textContent = 'Descartar sesión';
  cancel.onclick = () => {
    if (confirm('¿Descartar esta sesión? Se pierde todo lo que has anotado hoy.')) { S.active = null; save(); tab('hoy'); }
  };
  foot.appendChild(cancel);
  foot.appendChild(el('p', '', `<span style="font-family:var(--f-mono);font-size:11px;color:var(--chalk-mute)">${esc(d.note)}</span>`));
  body.appendChild(foot);
  s.appendChild(body);
}

function finish() {
  const a = S.active;
  Object.keys(a.sets).forEach(k => { a.sets[k] = a.sets[k].filter(x => x.done); if (!a.sets[k].length) delete a.sets[k]; });
  S.log.push(a);
  S.active = null;
  S.idx++;
  if (S.idx % 6 === 0) S.cycles++;
  save();
  stopRest();
  beep(2);
  stack = [{ n: 'hoy' }];
  render();
  toast('Sesión guardada. Buen trabajo.');
}

/* En español los decimales van con coma. */
const nf = n => String(+(+n).toFixed(2)).replace('.', ',');

function fmtSet(x, log) {
  if (log === 'time') return `${nf(x.r || 0)}s`;
  if (log === 'steps') return `${nf(x.r || 0)} pasos`;
  if (log === 'bw') return (x.w ? `+${nf(x.w)}kg×` : 'PC×') + nf(x.r || 0);
  if (log === 'height') return `${nf(x.w || 0)}cm×${nf(x.r || 0)}`;
  return `${nf(x.w || 0)}kg×${nf(x.r || 0)}`;
}

function setsEditor(exId, it, e) {
  const wrap = el('div', 'sets');
  const arr = S.active.sets[exId];
  const flds = FIELDS[e.log];

  arr.forEach((set, i) => {
    const row = el('div', 'setrow' + (set.done ? ' done' : ''));
    row.style.gridTemplateColumns = flds.length === 1 ? '30px 1fr 46px' : '30px 1fr 1fr 46px';
    row.appendChild(el('span', 'n', String(i + 1)));
    flds.forEach(f => {
      const fd = el('span', 'fld');
      fd.innerHTML = `<label>${f.l}</label><input inputmode="decimal" enterkeyhint="next" placeholder="${f.ph}" value="${set[f.k] ?? ''}">`;
      const inp = fd.querySelector('input');
      inp.oninput = () => { set[f.k] = num(inp.value); save(); };
      wrap.appendChild ? null : null;
      row.appendChild(fd);
    });
    const t = el('button', 'tick');
    t.setAttribute('aria-label', set.done ? 'Deshacer serie' : 'Cerrar serie');
    t.innerHTML = `<svg viewBox="0 0 24 24"><path d="M4 12.5l5.2 5.2L20 7"/></svg>`;
    t.onclick = () => {
      if (!set.done) {
        const need = flds.find(f => set[f.k] == null && f.k === 'r');
        if (need) { toast('Anota las repeticiones antes de cerrar la serie.'); return; }
        set.done = true; save();
        row.classList.add('done');
        startRest(it.rest);
        if (arr.every(x => x.done)) toast('Ejercicio completo.');
      } else { set.done = false; save(); row.classList.remove('done'); }
      refreshTick();
    };
    row.appendChild(t);
    wrap.appendChild(row);
  });
  function refreshTick() { }
  return wrap;
}

function vProg(s) {
  header(s, 'Progreso', '¿Estoy mejorando?', 'Tus marcas frente a los ciclos anteriores.');
  const body = el('div', 'stack-lg');

  /* KPIs */
  const k = el('div', 'kpis');
  const sess = S.log.length;
  const totalVol = S.log.reduce((v, s2) => v + Object.values(s2.sets).reduce((a, arr) => a + volume(arr), 0), 0);
  const jump = S.jump.length ? S.jump[S.jump.length - 1] : null;
  const jumpPrev = S.jump.length > 1 ? S.jump[S.jump.length - 2] : null;
  const bw = S.body.length ? S.body[S.body.length - 1] : null;
  const bwPrev = S.body.length > 1 ? S.body[S.body.length - 2] : null;

  k.appendChild(el('div', 'kpi', `<div class="k">Sesiones</div><div class="v">${sess}</div><div class="d">${S.cycles} ciclo${S.cycles === 1 ? '' : 's'} completo${S.cycles === 1 ? '' : 's'}</div>`));
  k.appendChild(el('div', 'kpi', `<div class="k">Volumen total</div><div class="v">${totalVol >= 1000 ? nf(totalVol / 1000) : nf(totalVol)}<small>${totalVol >= 1000 ? 't' : 'kg'}</small></div><div class="d">peso × reps acumulado</div>`));
  k.appendChild(el('div', 'kpi', `<div class="k">Salto (cajón)</div><div class="v">${jump ? nf(jump.cm) : '—'}<small>${jump ? 'cm' : ''}</small></div>
    <div class="d${jump && jumpPrev && jump.cm > jumpPrev.cm ? ' up' : ''}">${jump && jumpPrev ? (jump.cm - jumpPrev.cm >= 0 ? '+' : '') + nf(jump.cm - jumpPrev.cm) + ' cm' : 'sin registro'}</div>`));
  k.appendChild(el('div', 'kpi', `<div class="k">Peso corporal</div><div class="v">${bw ? nf(bw.kg) : '—'}<small>${bw ? 'kg' : ''}</small></div>
    <div class="d">${bw && bwPrev ? (bw.kg - bwPrev.kg >= 0 ? '+' : '') + nf(bw.kg - bwPrev.kg) + ' kg' : 'sin registro'}</div>`));
  body.appendChild(k);

  /* medidas */
  const med = el('section');
  med.innerHTML = `<p class="sect-title">Anotar marca</p>`;
  const mrow = el('div', 'stack');
  mrow.appendChild(measure('Salto: altura de cajón', 'cm', v => { S.jump.push({ date: today(), cm: v }); save(); render(); }));
  mrow.appendChild(measure('Peso corporal', 'kg', v => { S.body.push({ date: today(), kg: v }); save(); render(); }));
  med.appendChild(mrow);
  if (S.jump.length > 1) med.appendChild(simpleChart('Altura de cajón', S.jump.map(x => ({ d: x.date, v: x.cm })), 'cm'));
  if (S.body.length > 1) med.appendChild(simpleChart('Peso corporal', S.body.map(x => ({ d: x.date, v: x.kg })), 'kg'));
  body.appendChild(med);

  /* récords */
  const withData = Object.keys(EX).filter(id => allSets(id).length);
  if (!withData.length) {
    body.appendChild(el('div', 'empty', 'Aún no hay nada que medir.<br>Cierra tu primera sesión y aquí empezarán a salir las curvas.'));
  } else {
    const pr = el('section');
    pr.innerHTML = `<p class="sect-title">Récords personales</p>`;
    const st = el('div', 'stack');
    withData.forEach(id => {
      const b = prOf(id), e = EX[id];
      if (!b) return;
      const one = e.log === 'weight' && b.w > 0 ? e1rm(b.w, b.r) : 0;
      st.appendChild(el('div', 'pr', `
        <span class="nm">${esc(e.tag)}${one ? `<br><span class="dt">1RM estimado ${one} kg</span>` : ''}</span>
        <span style="text-align:right"><span class="val">${esc(fmtSet(b, e.log))}</span><br><span class="dt">${esc(fmtDate(b.date))}</span></span>`));
    });
    pr.appendChild(st);
    body.appendChild(pr);

    const ch = el('section');
    ch.innerHTML = `<p class="sect-title">Curvas por ejercicio</p>`;
    const cs = el('div', 'stack');
    withData.forEach(id => { const h = allSets(id); if (h.length > 1) cs.appendChild(chartCard(EX[id], h)); });
    ch.appendChild(cs);
    if (cs.children.length) body.appendChild(ch);
  }

  s.appendChild(body);
}

function measure(label, unit, onAdd) {
  const r = el('div', 'row');
  r.innerHTML = `<span class="lb">${esc(label)}</span>`;
  const f = el('span', 'fld');
  f.style.width = '92px';
  f.innerHTML = `<label>${unit}</label><input inputmode="decimal" placeholder="—">`;
  const b = el('button', 'btn btn-sm');
  b.textContent = 'Añadir';
  b.onclick = () => { const v = num(f.querySelector('input').value); if (v == null) { toast('Escribe un número primero.'); return; } onAdd(v); };
  r.appendChild(f); r.appendChild(b);
  return r;
}

/* ---------- gráficas ---------- */
function chartCard(e, hist) {
  const pts = hist.map(h => { const b = bestOf(h.sets); return { d: h.date, v: e.log === 'time' || e.log === 'steps' ? b.r : (b.w || b.r) }; });
  const unit = UNIT[e.log];
  return simpleChart(e.tag, pts, unit);
}

function simpleChart(title, pts, unit) {
  const c = el('div', 'chart');
  const last = pts[pts.length - 1].v, first = pts[0].v;
  const diff = last - first;
  c.innerHTML = `<div class="top"><strong>${esc(title)}</strong><span>${nf(last)} ${unit}${pts.length > 1 && diff !== 0 ? ` <span style="color:var(--chalk-mute);font-size:12px">(${diff > 0 ? '+' : ''}${nf(diff)})</span>` : ''}</span></div><canvas></canvas>`;
  const cv = c.querySelector('canvas');
  requestAnimationFrame(() => drawChart(cv, pts, unit));
  return c;
}

function drawChart(cv, pts, unit) {
  const dpr = Math.min(devicePixelRatio || 1, 3);
  const r = cv.getBoundingClientRect();
  const w = Math.max(r.width, 200), h = 148;
  cv.width = w * dpr; cv.height = h * dpr;
  const x = cv.getContext('2d'); x.scale(dpr, dpr);

  const cs = getComputedStyle(document.documentElement), g = n => cs.getPropertyValue(n).trim();
  const chalk = g('--chalk'), mute = g('--chalk-mute'), hair = g('--hair-soft'), leather = g('--leather');

  const padL = 6, padR = 34, padT = 12, padB = 20;
  const vals = pts.map(p => p.v);
  let lo = Math.min(...vals), hi = Math.max(...vals);
  if (hi === lo) { hi = lo + 1; lo = Math.max(0, lo - 1); }
  const pad = (hi - lo) * 0.18; lo -= pad; hi += pad;
  const X = i => padL + (i / Math.max(1, pts.length - 1)) * (w - padL - padR);
  const Y = v => padT + (1 - (v - lo) / (hi - lo)) * (h - padT - padB);

  /* rejilla */
  x.strokeStyle = hair; x.lineWidth = 1;
  for (let i = 0; i <= 2; i++) {
    const yy = padT + (i / 2) * (h - padT - padB);
    x.beginPath(); x.moveTo(padL, yy); x.lineTo(w - padR, yy); x.stroke();
  }
  x.fillStyle = mute; x.font = `10px ${g('--f-mono') || 'monospace'}`; x.textAlign = 'left';
  x.fillText(String(+hi.toFixed(0)), w - padR + 6, padT + 4);
  x.fillText(String(+lo.toFixed(0)), w - padR + 6, h - padB + 4);

  /* área */
  const grad = x.createLinearGradient(0, padT, 0, h - padB);
  grad.addColorStop(0, leather + '38'); grad.addColorStop(1, leather + '00');
  x.beginPath();
  pts.forEach((p, i) => i ? x.lineTo(X(i), Y(p.v)) : x.moveTo(X(i), Y(p.v)));
  x.lineTo(X(pts.length - 1), h - padB); x.lineTo(X(0), h - padB); x.closePath();
  x.fillStyle = grad; x.fill();

  /* línea */
  x.beginPath();
  pts.forEach((p, i) => i ? x.lineTo(X(i), Y(p.v)) : x.moveTo(X(i), Y(p.v)));
  x.strokeStyle = leather; x.lineWidth = 2.2; x.lineJoin = 'round'; x.lineCap = 'round'; x.stroke();

  /* puntos */
  pts.forEach((p, i) => {
    const isLast = i === pts.length - 1;
    x.beginPath(); x.arc(X(i), Y(p.v), isLast ? 4.6 : 2.6, 0, 7);
    x.fillStyle = isLast ? leather : hair; x.fill();
    if (isLast) { x.lineWidth = 2.4; x.strokeStyle = g('--panel'); x.stroke(); }
  });

  /* fechas extremas */
  x.fillStyle = mute; x.font = `10px ${g('--f-mono') || 'monospace'}`;
  x.textAlign = 'left'; x.fillText(fmtDate(pts[0].d), padL, h - 5);
  x.textAlign = 'right'; x.fillText(fmtDate(pts[pts.length - 1].d), w - padR, h - 5);
}

/* ---------- AJUSTES ---------- */
function vAjustes(s) {
  header(s, 'Ajustes', 'Tu app', 'Todo lo que anotas vive solo en este iPhone.');
  const body = el('div', 'stack-lg');

  const look = el('section');
  look.innerHTML = `<p class="sect-title">Aspecto</p>`;
  const chips = el('div', 'chips');
  [['auto', 'Automático'], ['dark', 'Pista'], ['light', 'Parqué']].forEach(([k, l]) => {
    const b = el('button', 'chip', l);
    b.setAttribute('aria-pressed', S.theme === k);
    b.onclick = () => { S.theme = k; save(); applyTheme(); render(); };
    chips.appendChild(b);
  });
  look.appendChild(chips);
  body.appendChild(look);

  const snd = el('section');
  snd.innerHTML = `<p class="sect-title">Descanso</p>`;
  const row = el('div', 'row');
  row.innerHTML = `<span class="lb">Aviso sonoro al terminar</span>`;
  const sb = el('button', 'chip', S.sound ? 'Activado' : 'Silencio');
  sb.setAttribute('aria-pressed', S.sound);
  sb.onclick = () => { S.sound = !S.sound; save(); if (S.sound) beep(1); render(); };
  row.appendChild(sb);
  snd.appendChild(row);
  snd.appendChild(el('p', '', `<span style="font-family:var(--f-mono);font-size:11px;color:var(--chalk-mute)">iOS no deja que una app web haga vibrar el móvil, así que el aviso es un pitido. Súbele el volumen si el gimnasio está ruidoso.</span>`));
  body.appendChild(snd);

  const cyc = el('section');
  cyc.innerHTML = `<p class="sect-title">Punto del ciclo</p>`;
  const c = cur();
  const cr = el('div', 'row');
  cr.innerHTML = `<span class="lb">Siguiente<br><span style="color:var(--chalk-mute);font-size:13px">Semana ${c.week} · Día ${c.slot} · ${DAYS[c.kind].title}</span></span>`;
  const cb = el('button', 'chip', 'Saltar');
  cb.onclick = () => { S.idx++; if (S.idx % 6 === 0) S.cycles++; save(); render(); toast('Sesión saltada.'); };
  cr.appendChild(cb);
  cyc.appendChild(cr);
  body.appendChild(cyc);

  const dat = el('section');
  dat.innerHTML = `<p class="sect-title">Copia de seguridad</p>`;
  const ta = el('textarea');
  ta.readOnly = true;
  ta.value = JSON.stringify(S);
  ta.style.cssText = 'width:100%;height:86px;border-radius:12px;border:1px solid var(--hair);background:var(--panel);color:var(--chalk-mute);padding:10px;font-family:var(--f-mono);font-size:11px;resize:none';
  const btns = el('div', 'chips');
  const cp = el('button', 'btn btn-ghost btn-sm', 'Copiar mis datos');
  cp.onclick = async () => {
    try { await navigator.clipboard.writeText(ta.value); toast('Copiado. Pégalo en Notas y lo tienes a salvo.'); }
    catch (e) { ta.select(); toast('Selecciona el texto y cópialo a mano.'); }
  };
  const imp = el('button', 'btn btn-ghost btn-sm', 'Restaurar desde copia');
  imp.onclick = () => {
    const t = prompt('Pega aquí la copia de seguridad:');
    if (!t) return;
    try {
      const o = JSON.parse(t);
      if (!o || typeof o !== 'object' || !Array.isArray(o.log)) throw 0;
      S = Object.assign(structuredClone(DEF), o); save(); applyTheme(); tab('hoy');
      toast('Datos restaurados.');
    } catch (e) { toast('Esa copia no es válida. No se ha tocado nada.'); }
  };
  btns.appendChild(cp); btns.appendChild(imp);
  dat.appendChild(ta); dat.appendChild(btns);
  dat.appendChild(el('p', '', `<span style="font-family:var(--f-mono);font-size:11px;color:var(--chalk-mute)">Si borras la app de la pantalla de inicio o limpias los datos de Safari, se va el historial. Copia esto de vez en cuando.</span>`));
  body.appendChild(dat);

  const dz = el('section');
  dz.innerHTML = `<p class="sect-title">Zona peligrosa</p>`;
  const rb = el('button', 'btn btn-ghost', 'Borrar todo el historial');
  rb.style.color = 'var(--leather)';
  rb.onclick = () => {
    if (!confirm('Esto borra todas tus sesiones, marcas y récords. No se puede deshacer. ¿Seguro?')) return;
    if (!confirm('Última confirmación: se pierde todo.')) return;
    S = structuredClone(DEF); save(); applyTheme(); tab('hoy'); toast('Historial borrado.');
  };
  dz.appendChild(rb);
  body.appendChild(dz);

  body.appendChild(el('p', '', `<span style="font-family:var(--f-mono);font-size:10.5px;color:var(--chalk-mute);display:block;text-align:center;padding:8px 0 4px">VERTICAL · programa de fuerza para baloncesto</span>`));
  s.appendChild(body);
}

/* ============ tabs ============ */
const TABS = [
  ['hoy', 'Hoy', '<path d="M4 20V9.5L12 3l8 6.5V20a1 1 0 0 1-1 1h-4v-6h-6v6H5a1 1 0 0 1-1-1z"/>'],
  ['plan', 'Plan', '<rect x="3.5" y="4.5" width="17" height="16" rx="2.5"/><path d="M3.5 9.5h17M8.5 3v3M15.5 3v3M8 14h3M8 17.5h6"/>'],
  ['lista', 'Ejercicios', '<path d="M6.5 9v6M17.5 9v6M3.5 10.5v3M20.5 10.5v3M6.5 12h11"/>'],
  ['prog', 'Progreso', '<path d="M4 19V5M4 19h16M7.5 15.5l3.5-4 3 2.5 5-6.5"/>'],
  ['ajustes', 'Ajustes', '<circle cx="12" cy="12" r="3"/><path d="M12 2.5v3M12 18.5v3M21.5 12h-3M5.5 12h-3M18.7 5.3l-2 2M7.3 16.7l-2 2M18.7 18.7l-2-2M7.3 7.3l-2-2"/>']
];
function paintTabs(active) {
  const bar = $('.tabbar');
  if (!bar.children.length) {
    TABS.forEach(([k, l, p]) => {
      const b = el('button', '', `<svg viewBox="0 0 24 24">${p}</svg><span>${l}</span>`);
      b.onclick = () => { if (here().n !== k) tab(k); };
      b.dataset.k = k;
      bar.appendChild(b);
    });
  }
  /* La pestaña marcada es la raíz de la pila, no la pantalla actual. */
  const rootTab = stack[0].n === 'sesion' ? 'hoy' : stack[0].n;
  [...bar.children].forEach(b => b.setAttribute('aria-current', b.dataset.k === rootTab));
}

/* ============ tema ============ */
function applyTheme() {
  const r = document.documentElement;
  if (S.theme === 'auto') r.removeAttribute('data-theme');
  else r.setAttribute('data-theme', S.theme);
  const dark = S.theme === 'dark' || (S.theme === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches);
  const m = $('meta[name="theme-color"]');
  if (m) m.setAttribute('content', dark ? '#131110' : '#F0E3CB');
}

/* Deja la cabecera lista para "Añadir a pantalla de inicio", venga de donde venga
   la página. Safari lee estas etiquetas al instalar, no solo al cargar. */
function installMeta() {
  const head = document.head;
  const set = (sel, tag, attrs) => {
    let n = head.querySelector(sel);
    if (!n) { n = document.createElement(tag); head.appendChild(n); }
    for (const k in attrs) n.setAttribute(k, attrs[k]);
  };
  set('meta[name="viewport"]', 'meta', { name: 'viewport', content: 'width=device-width, initial-scale=1, viewport-fit=cover' });
  set('meta[name="apple-mobile-web-app-capable"]', 'meta', { name: 'apple-mobile-web-app-capable', content: 'yes' });
  set('meta[name="mobile-web-app-capable"]', 'meta', { name: 'mobile-web-app-capable', content: 'yes' });
  set('meta[name="apple-mobile-web-app-status-bar-style"]', 'meta', { name: 'apple-mobile-web-app-status-bar-style', content: 'black-translucent' });
  set('meta[name="apple-mobile-web-app-title"]', 'meta', { name: 'apple-mobile-web-app-title', content: 'VERTICAL' });
  set('meta[name="theme-color"]', 'meta', { name: 'theme-color', content: '#131110' });
  if (window.VERTICAL_ICON) {
    set('link[rel="apple-touch-icon"]', 'link', { rel: 'apple-touch-icon', href: window.VERTICAL_ICON });
    set('link[rel="icon"]', 'link', { rel: 'icon', type: 'image/png', href: window.VERTICAL_ICON });
  }
  document.title = 'VERTICAL';
}

/* Si la app se sirve desde un origen HTTPS propio, registra el service worker:
   es lo que la deja instalada de verdad y funcionando sin cobertura. */
function installOffline() {
  if (!('serviceWorker' in navigator)) return;
  if (location.protocol !== 'https:' && location.hostname !== 'localhost') return;
  navigator.serviceWorker.register('./sw.js').catch(() => { /* sin sw, la app sigue igual */ });
}

/* ============ arranque ============ */
function boot() {
  installMeta();
  installOffline();
  applyTheme();
  matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
  $('#rest-skip').onclick = stopRest;
  $('#rest-add').onclick = () => { R.left += 30; R.total = Math.max(R.total, R.left); paintRest(); };
  if (S.active) stack = [{ n: 'hoy' }];
  render();
}

</script>
<script>boot();</script>
